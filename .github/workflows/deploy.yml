name: Build & deploy app-v2 (production)

on:
  push:
    branches: [main]
    paths:
      - 'app-v2/**'
      - 'deploy-prod/**'
      - 'deploy-staging/api/**'
      - 'clients/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-app-v2
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app-v2/pnpm-lock.yaml

      - name: Install dependencies
        # --ignore-scripts: don't run postinstall hooks. We have one transitive
        # dep (msw) whose postinstall pnpm refuses to silently skip; we don't
        # need any postinstall to run for a static SPA build.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build (production — REST API enabled)
        env:
          # Full-parity cutover: the prod SPA talks to the /api/v1/* surface.
          # No VITE_API_TOKEN — the SPA exchanges its basicauth session for a
          # short-lived dash_* token via /api/v1/auth/exchange on boot
          # (per-client scoped). See deploy-staging/api/src/routes/authExchange.ts.
          VITE_API_BASE: https://marketing.gfinnov.com/api/v1
          VITE_PB_URL: https://marketing.gfinnov.com
        run: pnpm build

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.HETZNER_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist/ to Hetzner (prod app-dist — API-mode bundle)
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          TARGET: /opt/marketing-planner/app-dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./dist/ "$USER@$HOST:$TARGET/"

      - name: Sync deploy-prod config + api source
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        working-directory: .
        run: |
          # Inner-stack compose (renamed on the box so it never collides with the
          # outer-caddy docker-compose.yml), the INNER Caddyfile, and the PB launcher.
          # NOTE: this deliberately does NOT touch /opt/marketing-planner/Caddyfile
          # (the shared OUTER caddy config) — that file is hand-managed.
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            deploy-prod/docker-compose.yml \
            "$USER@$HOST:/opt/marketing-planner/docker-compose.prod-inner.yml"
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            deploy-prod/Caddyfile.prod \
            deploy-prod/pb-run.prod.sh \
            "$USER@$HOST:/opt/marketing-planner/"
          # PB migrations — clean set only (--delete keeps the stale, PB-version
          # incompatible 1748* migrations from ever being reintroduced).
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            deploy-prod/pb-migrations/ \
            "$USER@$HOST:/opt/marketing-planner/pb-migrations/"
          # API source (same Hono code as staging). Never sync node_modules/dist/.env.
          rsync -avz --delete \
            --exclude node_modules --exclude dist --exclude .env \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            deploy-staging/api/ \
            "$USER@$HOST:/opt/marketing-planner/api/"

      - name: Sync client seed data (disk — Viktor-owned files; user-owned live in PB)
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        working-directory: .
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            clients/index.json \
            "$USER@$HOST:/opt/marketing-planner/clients/index.json"
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            clients/gf-internal/ \
            "$USER@$HOST:/opt/marketing-planner/clients/gf-internal/"
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            clients/fitvibe-demo/ \
            "$USER@$HOST:/opt/marketing-planner/clients/fitvibe-demo/"

      - name: Build + start prod api & caddy (inner stack)
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes "$USER@$HOST" \
            'cd /opt/marketing-planner && docker compose -p mp-prod-inner -f docker-compose.prod-inner.yml up -d --build api caddy'
