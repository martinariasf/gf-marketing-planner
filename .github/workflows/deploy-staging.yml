name: Build & deploy staging (experimental)

on:
  push:
    branches: [experimental]
    paths:
      - 'app-v2/**'
      - 'deploy-staging/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: app-v2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app-v2/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build (staging — PocketBase enabled)
        env:
          VITE_PB_URL: https://staging.marketing.gfinnov.com
        run: pnpm build

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.HETZNER_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync dist/ to staging on Hetzner
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
          TARGET: /opt/marketing-planner-staging/app-dist
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            ./dist/ "$USER@$HOST:$TARGET/"

      - name: Sync deploy-staging config
        env:
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        working-directory: .
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            deploy-staging/docker-compose.yml \
            deploy-staging/Caddyfile.staging \
            deploy-staging/pb-migrations/ \
            "$USER@$HOST:/opt/marketing-planner-staging/"
