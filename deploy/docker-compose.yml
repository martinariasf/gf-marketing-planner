# Viktor Marketing Operating Dashboard - Caddy container
#
# Public deployment at https://marketing.gfinnov.com with per-client
# basic auth on /data/<slug>/*. The SPA itself is open; the data is gated.
#
# Volumes (read-only into the container):
#   ./app-dist  - the React build, overwritten by CI via rsync
#   ./clients   - per-client JSON data, edited live by Viktor
#
# Neither volume requires a container restart when contents change.
# Caddy serves files from disk on every request.

services:
  caddy:
    image: caddy:2-alpine
    container_name: marketing-planner-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./app-dist:/srv/app:ro
      - ./clients:/srv/data:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
